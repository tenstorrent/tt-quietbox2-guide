name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Rebuild daily at 06:00 UTC to pick up compatibility matrix updates
    - cron: "0 6 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; don't cancel in-progress runs
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build with Eleventy
        run: npm run build

      - name: Install Chromium for PDF rendering
        run: npx playwright install --with-deps chromium

      - name: Generate complete-guide PDF
        run: npm run pdf

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
