<svg viewBox="0 0 680 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Inference stack diagram showing user interfaces, middleware, and Blackhole hardware layers">
  <title>QB2 Inference Stack — from user interfaces to Blackhole chips</title>
  <defs>
    <pattern id="idots" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.7" fill="rgba(79,209,197,0.08)"/>
    </pattern>
    <marker id="iarr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="rgba(79,209,197,0.6)"/>
    </marker>
    <marker id="iarr-gold" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="rgba(244,196,113,0.6)"/>
    </marker>
    <marker id="iarr-pink" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="rgba(236,150,184,0.6)"/>
    </marker>
    <marker id="iarr-muted" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="rgba(96,125,139,0.5)"/>
    </marker>
  </defs>

  <!-- Panel background -->
  <rect width="680" height="280" rx="6" fill="#0a1e28"/>
  <rect width="680" height="280" rx="6" fill="url(#idots)"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="680" height="22" rx="6" fill="#0F2A35"/>
  <rect x="0" y="16" width="680" height="6" fill="#0F2A35"/>
  <text x="14" y="15" fill="#607D8B" font-size="8" font-family="monospace" letter-spacing="1.5">QB2 INFERENCE STACK — SIGNAL PATH</text>

  <!-- ═══════════════════════════════════════════════
       ROW 1: USER INTERFACES (top)
       ─────────────────────────────────────────────── -->
  <text x="14" y="42" fill="#607D8B" font-size="7.5" font-family="monospace" letter-spacing="1">USER INTERFACES</text>

  <!-- tt-local-generator box (leftmost) -->
  <rect x="12" y="48" width="138" height="52" rx="4" fill="rgba(79,209,197,0.05)" stroke="#4FD1C5" stroke-width="1.5"/>
  <text x="81" y="65" text-anchor="middle" fill="#4FD1C5" font-size="8.5" font-family="monospace" letter-spacing="0.5">tt-local-generator</text>
  <text x="81" y="78" text-anchor="middle" fill="#81E6D9" font-size="7" font-family="monospace">GTK4 desktop app</text>
  <text x="81" y="91" text-anchor="middle" fill="#607D8B" font-size="6.5" font-family="monospace">video · image · art</text>

  <!-- tt-studio box (middle) -->
  <rect x="168" y="48" width="138" height="52" rx="4" fill="rgba(244,196,113,0.05)" stroke="#F4C471" stroke-width="1.5"/>
  <text x="237" y="65" text-anchor="middle" fill="#F4C471" font-size="8.5" font-family="monospace" letter-spacing="0.5">tt-studio</text>
  <text x="237" y="78" text-anchor="middle" fill="#E6B55E" font-size="7" font-family="monospace">web UI  :7860</text>
  <text x="237" y="91" text-anchor="middle" fill="#607D8B" font-size="6.5" font-family="monospace">browser in · tokens out</text>

  <!-- OpenAI-compatible clients box (right) -->
  <rect x="324" y="48" width="138" height="52" rx="4" fill="rgba(236,150,184,0.05)" stroke="rgba(236,150,184,0.5)" stroke-width="1.5"/>
  <text x="393" y="65" text-anchor="middle" fill="#EC96B8" font-size="8.5" font-family="monospace" letter-spacing="0.5">OpenAI-compat client</text>
  <text x="393" y="78" text-anchor="middle" fill="#EC96B8" font-size="7" font-family="monospace">curl · Python · apps</text>
  <text x="393" y="91" text-anchor="middle" fill="#607D8B" font-size="6.5" font-family="monospace">any OpenAI SDK client</text>

  <!-- ═══════════════════════════════════════════════
       ROW 2: MIDDLE LAYER
       ─────────────────────────────────────────────── -->
  <text x="14" y="126" fill="#607D8B" font-size="7.5" font-family="monospace" letter-spacing="1">MIDDLEWARE</text>

  <!-- tt-inference-server hub box -->
  <rect x="12" y="132" width="210" height="56" rx="4" fill="rgba(79,209,197,0.06)" stroke="#4FD1C5" stroke-width="1.5"/>
  <text x="117" y="150" text-anchor="middle" fill="#4FD1C5" font-size="8.5" font-family="monospace" letter-spacing="0.5">tt-inference-server</text>
  <text x="117" y="163" text-anchor="middle" fill="#81E6D9" font-size="7" font-family="monospace">Docker automation  :8000</text>
  <text x="117" y="176" text-anchor="middle" fill="#607D8B" font-size="6.5" font-family="monospace">one-command model deploy</text>
  <!-- jack on right side -->
  <circle cx="222" cy="160" r="3.5" fill="#0a1e28" stroke="rgba(79,209,197,0.5)" stroke-width="1.2"/>

  <!-- vLLM TT fork box (beside inference-server) -->
  <rect x="240" y="132" width="160" height="56" rx="4" fill="rgba(244,196,113,0.05)" stroke="rgba(244,196,113,0.4)" stroke-width="1.5"/>
  <text x="320" y="150" text-anchor="middle" fill="#F4C471" font-size="8.5" font-family="monospace" letter-spacing="0.5">vLLM  (TT fork)</text>
  <text x="320" y="163" text-anchor="middle" fill="#E6B55E" font-size="7" font-family="monospace">OpenAI-compat HTTP  :8000</text>
  <text x="320" y="176" text-anchor="middle" fill="#607D8B" font-size="6.5" font-family="monospace">runs inside the container</text>
  <!-- jack on left side -->
  <circle cx="240" cy="160" r="3.5" fill="#0a1e28" stroke="rgba(244,196,113,0.5)" stroke-width="1.2"/>

  <!-- Prompt server box (right column) -->
  <rect x="420" y="132" width="160" height="56" rx="4" fill="rgba(236,150,184,0.05)" stroke="rgba(236,150,184,0.4)" stroke-width="1.5"/>
  <text x="500" y="150" text-anchor="middle" fill="#EC96B8" font-size="8.5" font-family="monospace" letter-spacing="0.5">prompt server</text>
  <text x="500" y="163" text-anchor="middle" fill="#EC96B8" font-size="7" font-family="monospace">Qwen3-0.6B  :8001</text>
  <text x="500" y="176" text-anchor="middle" fill="#607D8B" font-size="6.5" font-family="monospace">LLM prompt polishing</text>

  <!-- AnimateDiff native label (small, under tt-local-generator) -->
  <rect x="12" y="194" width="138" height="22" rx="3" fill="rgba(39,174,96,0.04)" stroke="rgba(39,174,96,0.3)" stroke-width="1"/>
  <text x="81" y="209" text-anchor="middle" fill="#27AE60" font-size="7" font-family="monospace">AnimateDiff (native, no server)</text>

  <!-- ═══════════════════════════════════════════════
       ROW 3: HARDWARE
       ─────────────────────────────────────────────── -->
  <text x="14" y="232" fill="#607D8B" font-size="7.5" font-family="monospace" letter-spacing="1">HARDWARE</text>

  <!-- TT-Metalium runtime box -->
  <rect x="12" y="238" width="210" height="30" rx="3" fill="rgba(79,209,197,0.04)" stroke="rgba(79,209,197,0.2)" stroke-width="1"/>
  <text x="117" y="257" text-anchor="middle" fill="#81E6D9" font-size="8" font-family="monospace">TT-Metalium runtime</text>

  <!-- 4x Blackhole chips row -->
  <rect x="240" y="238" width="68" height="30" rx="3" fill="rgba(79,209,197,0.06)" stroke="#4FD1C5" stroke-width="1.5"/>
  <text x="274" y="252" text-anchor="middle" fill="#4FD1C5" font-size="7.5" font-family="monospace">BH #0</text>
  <text x="274" y="263" text-anchor="middle" fill="#607D8B" font-size="6" font-family="monospace">P300c</text>

  <rect x="316" y="238" width="68" height="30" rx="3" fill="rgba(79,209,197,0.06)" stroke="#4FD1C5" stroke-width="1.5"/>
  <text x="350" y="252" text-anchor="middle" fill="#4FD1C5" font-size="7.5" font-family="monospace">BH #1</text>
  <text x="350" y="263" text-anchor="middle" fill="#607D8B" font-size="6" font-family="monospace">P300c</text>

  <rect x="392" y="238" width="68" height="30" rx="3" fill="rgba(79,209,197,0.06)" stroke="#4FD1C5" stroke-width="1.5"/>
  <text x="426" y="252" text-anchor="middle" fill="#4FD1C5" font-size="7.5" font-family="monospace">BH #2</text>
  <text x="426" y="263" text-anchor="middle" fill="#607D8B" font-size="6" font-family="monospace">P300c</text>

  <rect x="468" y="238" width="68" height="30" rx="3" fill="rgba(79,209,197,0.06)" stroke="#4FD1C5" stroke-width="1.5"/>
  <text x="502" y="252" text-anchor="middle" fill="#4FD1C5" font-size="7.5" font-family="monospace">BH #3</text>
  <text x="502" y="263" text-anchor="middle" fill="#607D8B" font-size="6" font-family="monospace">P300c</text>

  <!-- ═══════════════════════════════════════════════
       PATCH CABLES — top to middle
       ─────────────────────────────────────────────── -->

  <!-- tt-local-generator → tt-inference-server (port 8000) -->
  <line x1="81" y1="100" x2="81" y2="132" stroke="rgba(79,209,197,0.5)" stroke-width="1.2" stroke-dasharray="3,2" marker-end="url(#iarr)"/>

  <!-- tt-studio → tt-inference-server (port 8000) -->
  <line x1="237" y1="100" x2="170" y2="132" stroke="rgba(244,196,113,0.5)" stroke-width="1.2" stroke-dasharray="3,2" marker-end="url(#iarr-gold)"/>

  <!-- tt-local-generator → prompt server (port 8001, dashed pink) -->
  <path d="M 150 74 Q 580 55 500 132" fill="none" stroke="rgba(236,150,184,0.45)" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#iarr-pink)"/>

  <!-- OpenAI client → vLLM direct (dashed, muted — bypasses tt-inference-server) -->
  <line x1="393" y1="100" x2="350" y2="132" stroke="rgba(96,125,139,0.45)" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#iarr-muted)"/>

  <!-- tt-inference-server ↔ vLLM (internal cable) -->
  <line x1="222" y1="160" x2="240" y2="160" stroke="rgba(79,209,197,0.4)" stroke-width="1.2" stroke-dasharray="3,2"/>

  <!-- ═══════════════════════════════════════════════
       PATCH CABLES — middle to hardware
       ─────────────────────────────────────────────── -->

  <!-- tt-inference-server → TT-Metalium -->
  <line x1="117" y1="188" x2="117" y2="238" stroke="rgba(79,209,197,0.4)" stroke-width="1.2" stroke-dasharray="3,2" marker-end="url(#iarr)"/>

  <!-- vLLM → Blackhole chips (fan out) -->
  <line x1="290" y1="188" x2="274" y2="238" stroke="rgba(244,196,113,0.35)" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#iarr-gold)"/>
  <line x1="320" y1="188" x2="350" y2="238" stroke="rgba(244,196,113,0.35)" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#iarr-gold)"/>
  <line x1="350" y1="188" x2="426" y2="238" stroke="rgba(244,196,113,0.25)" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#iarr-gold)"/>
  <line x1="380" y1="188" x2="502" y2="238" stroke="rgba(244,196,113,0.2)" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#iarr-gold)"/>

  <!-- TT-Metalium → BH chips (backbone) -->
  <line x1="222" y1="253" x2="240" y2="253" stroke="rgba(79,209,197,0.3)" stroke-width="1" stroke-dasharray="2,2"/>

  <!-- ═══════════════════════════════════════════════
       LEGEND annotations (right column)
       ─────────────────────────────────────────────── -->
  <rect x="596" y="48" width="72" height="112" rx="3" fill="rgba(15,42,53,0.7)" stroke="rgba(79,209,197,0.1)" stroke-width="1"/>
  <text x="632" y="62" text-anchor="middle" fill="#607D8B" font-size="6.5" font-family="monospace" letter-spacing="0.5">LEGEND</text>
  <!-- teal line -->
  <line x1="604" y1="75" x2="620" y2="75" stroke="rgba(79,209,197,0.5)" stroke-width="1.2" stroke-dasharray="3,2"/>
  <text x="625" y="79" fill="#607D8B" font-size="6" font-family="monospace">main path</text>
  <!-- gold line -->
  <line x1="604" y1="92" x2="620" y2="92" stroke="rgba(244,196,113,0.5)" stroke-width="1.2" stroke-dasharray="3,2"/>
  <text x="625" y="96" fill="#607D8B" font-size="6" font-family="monospace">studio path</text>
  <!-- pink line -->
  <line x1="604" y1="109" x2="620" y2="109" stroke="rgba(236,150,184,0.5)" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="625" y="113" fill="#607D8B" font-size="6" font-family="monospace">prompt :8001</text>
  <!-- muted line -->
  <line x1="604" y1="126" x2="620" y2="126" stroke="rgba(96,125,139,0.45)" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="625" y="130" fill="#607D8B" font-size="6" font-family="monospace">direct vLLM</text>
  <text x="625" y="140" fill="#607D8B" font-size="6" font-family="monospace">(bypass srvr)</text>
  <text x="625" y="152" fill="#607D8B" font-size="6" font-family="monospace">:8000</text>

  <!-- border frame -->
  <rect x="1" y="1" width="678" height="278" rx="5" fill="none" stroke="rgba(79,209,197,0.1)" stroke-width="1.5"/>
</svg>
