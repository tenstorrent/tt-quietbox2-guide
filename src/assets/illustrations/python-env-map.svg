<svg viewBox="0 0 620 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Python environment map showing system Python and Tenstorrent virtual environments">
  <title>Python Environment Map — system vs Tenstorrent venvs</title>
  <defs>
    <pattern id="grid2" x="0" y="0" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M10,0 L0,0 0,10" fill="none" stroke="rgba(79,209,197,0.05)" stroke-width="0.5"/>
    </pattern>
    <marker id="a2" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="rgba(79,209,197,0.5)"/>
    </marker>
    <marker id="a3" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="rgba(244,196,113,0.5)"/>
    </marker>
  </defs>

  <rect width="620" height="260" rx="6" fill="#0a1e28"/>
  <rect width="620" height="260" rx="6" fill="url(#grid2)"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="620" height="24" rx="6" fill="#0F2A35"/>
  <rect x="0" y="18" width="620" height="6" fill="#0F2A35"/>
  <text x="14" y="16" fill="#607D8B" font-size="8" font-family="monospace" letter-spacing="1.5">PYTHON ENVIRONMENTS — TT-QUIETBOX 2</text>

  <!-- ── SYSTEM PYTHON column ── -->
  <text x="18" y="44" fill="#607D8B" font-size="8" font-family="monospace" letter-spacing="1">SYSTEM</text>

  <rect x="12" y="50" width="130" height="28" rx="3" fill="rgba(45,49,66,0.4)" stroke="rgba(96,125,139,0.3)" stroke-width="1"/>
  <text x="77" y="63" text-anchor="middle" fill="#607D8B" font-size="8" font-family="monospace">/usr/bin/python3</text>
  <text x="77" y="73" text-anchor="middle" fill="#445566" font-size="7" font-family="monospace">Ubuntu system Python</text>

  <rect x="12" y="84" width="130" height="22" rx="3" fill="rgba(45,49,66,0.3)" stroke="rgba(96,125,139,0.2)" stroke-width="1"/>
  <text x="77" y="99" text-anchor="middle" fill="#445566" font-size="7.5" font-family="monospace">apt install python3-*</text>

  <!-- warning callout -->
  <rect x="12" y="112" width="130" height="50" rx="3" fill="rgba(244,196,113,0.04)" stroke="rgba(244,196,113,0.2)" stroke-width="1"/>
  <text x="77" y="126" text-anchor="middle" fill="#F4C471" font-size="7.5" font-family="monospace">⚠  don't pip install</text>
  <text x="77" y="138" text-anchor="middle" fill="#607D8B" font-size="7" font-family="monospace">here — Ubuntu 24.04</text>
  <text x="77" y="150" text-anchor="middle" fill="#607D8B" font-size="7" font-family="monospace">externally-managed</text>

  <!-- divider -->
  <line x1="155" y1="38" x2="155" y2="240" stroke="rgba(79,209,197,0.08)" stroke-width="1"/>

  <!-- ── TENSTORRENT VENVS ── -->
  <text x="170" y="44" fill="#607D8B" font-size="8" font-family="monospace" letter-spacing="1">TENSTORRENT VIRTUAL ENVIRONMENTS</text>

  <!-- TTNN venv -->
  <rect x="165" y="50" width="175" height="76" rx="4" fill="rgba(79,209,197,0.05)" stroke="#4FD1C5" stroke-width="1.5"/>
  <text x="252" y="66" text-anchor="middle" fill="#4FD1C5" font-size="8.5" font-family="monospace" letter-spacing="0.5">TTNN / Direct API</text>
  <text x="252" y="80" text-anchor="middle" fill="#81E6D9" font-size="7.5" font-family="monospace">~/tt-metal/python_env/</text>
  <text x="252" y="93" text-anchor="middle" fill="#607D8B" font-size="7" font-family="monospace">source .../bin/activate</text>
  <text x="178" y="118" fill="#607D8B" font-size="7" font-family="monospace">ttnn  transformers  torch</text>

  <!-- vLLM venv -->
  <rect x="165" y="136" width="175" height="62" rx="4" fill="rgba(244,196,113,0.04)" stroke="#F4C471" stroke-width="1.5"/>
  <text x="252" y="152" text-anchor="middle" fill="#F4C471" font-size="8.5" font-family="monospace" letter-spacing="0.5">vLLM serving</text>
  <text x="252" y="166" text-anchor="middle" fill="#E6B55E" font-size="7" font-family="monospace">~/tt-metal/build/python_env_vllm/</text>
  <text x="252" y="179" text-anchor="middle" fill="#607D8B" font-size="7" font-family="monospace">source .../bin/activate</text>
  <text x="178" y="192" fill="#607D8B" font-size="7" font-family="monospace">vllm  openai  huggingface_hub</text>

  <!-- divider 2 -->
  <line x1="352" y1="38" x2="352" y2="240" stroke="rgba(79,209,197,0.08)" stroke-width="1"/>

  <!-- Forge venv -->
  <rect x="360" y="50" width="155" height="62" rx="4" fill="rgba(236,150,184,0.04)" stroke="rgba(236,150,184,0.4)" stroke-width="1.5"/>
  <text x="438" y="66" text-anchor="middle" fill="#EC96B8" font-size="8.5" font-family="monospace" letter-spacing="0.5">TT-Forge / TT-XLA</text>
  <text x="438" y="80" text-anchor="middle" fill="#EC96B8" font-size="7" font-family="monospace">~/tt-forge-venv/</text>
  <text x="438" y="93" text-anchor="middle" fill="#607D8B" font-size="7" font-family="monospace">→ symlink → /opt/venv-forge</text>
  <text x="368" y="107" fill="#607D8B" font-size="7" font-family="monospace">torch-xla  jax  forge</text>

  <!-- CONFLICT warning between TTNN and Forge -->
  <rect x="360" y="124" width="155" height="34" rx="3" fill="rgba(255,107,107,0.04)" stroke="rgba(255,107,107,0.25)" stroke-width="1"/>
  <text x="438" y="138" text-anchor="middle" fill="#FF6B6B" font-size="7.5" font-family="monospace">⚠  conflict: unset</text>
  <text x="438" y="150" text-anchor="middle" fill="#607D8B" font-size="7" font-family="monospace">TT_METAL_HOME before use</text>

  <!-- Model storage -->
  <rect x="360" y="168" width="155" height="54" rx="4" fill="rgba(39,174,96,0.05)" stroke="rgba(39,174,96,0.3)" stroke-width="1.5"/>
  <text x="438" y="184" text-anchor="middle" fill="#27AE60" font-size="8.5" font-family="monospace" letter-spacing="0.5">model storage</text>
  <text x="438" y="198" text-anchor="middle" fill="#81E6D9" font-size="7" font-family="monospace">~/models/</text>
  <text x="368" y="212" fill="#607D8B" font-size="7" font-family="monospace">Qwen3-0.6B/   ~1.5 GB</text>
  <text x="368" y="222" fill="#607D8B" font-size="7" font-family="monospace">scratchpad: ~/tt-scratchpad/</text>

  <!-- which python3 box -->
  <rect x="12" y="172" width="130" height="54" rx="3" fill="rgba(79,209,197,0.04)" stroke="rgba(79,209,197,0.2)" stroke-width="1"/>
  <text x="77" y="186" text-anchor="middle" fill="#81E6D9" font-size="7.5" font-family="monospace">check what's active:</text>
  <text x="77" y="200" text-anchor="middle" fill="#4FD1C5" font-size="8" font-family="monospace">which python3</text>
  <text x="77" y="213" text-anchor="middle" fill="#607D8B" font-size="7" font-family="monospace">echo $VIRTUAL_ENV</text>

  <!-- Bottom note -->
  <text x="14" y="252" fill="rgba(96,125,139,0.6)" font-size="7" font-family="monospace">QB2 ships with TTNN + vLLM envs pre-installed at ~/tt-metal/ — no source tree, just the environments.</text>

  <rect x="1" y="1" width="618" height="258" rx="5" fill="none" stroke="rgba(79,209,197,0.1)" stroke-width="1.5"/>
</svg>
